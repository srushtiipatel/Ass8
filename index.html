<!DOCTYPE html>
<html>
<head>
  <title>Firebase Login Simple</title>
</head>
<body>

<h2>Simple Firebase Login</h2>

<input type="email" id="email" placeholder="Enter Email"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- Firebase v9+ (MODERN WORKING VERSION) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // 🔥 YOUR FIREBASE CONFIG (PASTE YOUR REAL ONE HERE)
  const firebaseConfig = {
    apiKey: "AIzaSyDKRdB1bUn3zh7tnelLtSQcC76hVijmZAQ",
    authDomain: "fir-login-project-6f964.firebaseapp.com",
    projectId: "fir-login-project-6f964",
    appId: "1:653712796128:web:29c001dc5565d340916385"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // SIGN UP FUNCTION
  window.signup = function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Signup Successful!";
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
  }

  // LOGIN FUNCTION
  window.login = function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Login Successful!";
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
  }
</script>

</body>
</html>
